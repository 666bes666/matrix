services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: matrix
      POSTGRES_USER: matrix
      POSTGRES_PASSWORD: matrix_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrix"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./src/backend
      dockerfile: ../../docker/backend.Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src/backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: ../../docker/frontend.Dockerfile
      target: build
    command: pnpm dev --host --port 3000
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000

  celery-worker:
    build:
      context: ./src/backend
      dockerfile: ../../docker/backend.Dockerfile
    command: uv run celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./src/backend:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./src/backend
      dockerfile: ../../docker/backend.Dockerfile
    command: uv run celery -A app.celery_app beat --loglevel=info
    volumes:
      - ./src/backend:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  telegram-bot:
    build:
      context: ./src/backend
      dockerfile: ../../docker/backend.Dockerfile
    command: uv run python -m app.telegram_bot
    volumes:
      - ./src/backend:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
